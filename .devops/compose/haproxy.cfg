global
  log stdout local0
  log stdout local1 notice
  log-tag haproxy

  # Expose runtime stats socket for Go client communication
  stats socket /var/run/haproxy/admin.sock mode 666 level admin
  stats socket /tmp/haproxy.sock mode 666 level admin

  # Performance tuning
  maxconn 4096
  tune.ssl.default-dh-param 2048

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  option  http-keep-alive
  option  forwardfor except 127.0.0.0/8
  option  redispatch

  timeout connect 5000
  timeout client  50000
  timeout server  50000

# Stats page for monitoring
listen stats
  bind *:80
  mode http
  stats enable
  stats uri /stats
  stats refresh 5s
  stats admin if TRUE

# Frontend for HTTP traffic
frontend http_in
  bind *:80
  mode http
  default_backend backends
  
  # Health check endpoint
  acl is_health_check path /health
  use_backend health_backend if is_health_check

# Health check backend
backend health_backend
  mode http
  balance roundrobin
  http-reuse safe
  server health_check 127.0.0.1:8080 check inter 5s fall 3 rise 2

# Main backend pool
backend backends
  mode http
  balance roundrobin
  option httpchk GET / HTTP/1.1\r\nHost:\ localhost
  http-reuse safe

  # Backend servers on the internal network
  server backend-1 backend-1:8001 check inter 5s fall 3 rise 2 weight 1
  server backend-2 backend-2:8002 check inter 5s fall 3 rise 2 weight 1
  server backend-3 backend-3:8003 check inter 5s fall 3 rise 2 weight 1

version: "3.8"

services:
  # Backends kept in compose for local testing; not declared in haproxy.cfg
  backend-1:
    image: python:3.11-alpine
    command: python -m http.server 8001
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8001",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  backend-2:
    image: python:3.11-alpine
    command: python -m http.server 8002
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18002:8002"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8002",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  backend-3:
    image: python:3.11-alpine
    command: python -m http.server 8003
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18003:8003"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8003",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  # HAProxy with runtime socket, configured by the app
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy
    user: "0:0"
    network_mode: host
    volumes:
      - ${PWD}/.devops/compose/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro,Z
      - ${PWD}/tmp/haproxy:/var/run/haproxy:Z
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-S", "/var/run/haproxy/admin.sock" ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW

version: "3.8"

services:
  # Backends kept in compose for local testing; not declared in haproxy.cfg
  backend-1:
    image: python:3.11-alpine
    command: python -m http.server 8001
    stop_signal: SIGINT
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8001",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  backend-2:
    image: python:3.11-alpine
    command: python -m http.server 8002
    stop_signal: SIGINT
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18002:8002"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8002",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  backend-3:
    image: python:3.11-alpine
    command: python -m http.server 8003
    stop_signal: SIGINT
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "18003:8003"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8003",
        ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  # Redis for managed configuration persistence (optional, used in dev with env override)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  # HAProxy with runtime socket, configured by the app
  haproxy:
    image: ${HAPROXY_IMAGE:-go-loadbalancer-manager-haproxy:latest}
    container_name: haproxy
    user: "0:0"
    command:
      [
        "-W",
        "-db",
        "-f",
        "/var/run/haproxy/haproxy.cfg",
        "-S",
        "/var/run/haproxy/master.sock",
      ]
    network_mode: host
    volumes:
      - ${PWD}/tmp/haproxy:/var/run/haproxy:Z
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "test", "-S", "/var/run/haproxy/admin.sock" ]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 3s
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW

volumes:
  redis-data:

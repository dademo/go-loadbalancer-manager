version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - gocheckcompilerdirectives
    - gocritic
    - govet
    - goprintffuncname
    - ineffassign
    - inamedparam
    - intrange
    - makezero
    - staticcheck
    - nilerr
    - nilnesserr
    - nilnil
    - prealloc
    - rowserrcheck
    - unused
    - unconvert
    - usestdlibvars
    - wastedassign
    - zerologlint
    - revive
    - misspell

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
